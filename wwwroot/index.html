<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目阶段汇总服务</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --card-soft: #f8fbff;
      --line: #d9e1ee;
      --line-soft: #e7edf6;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #64748b;
      --ghost: #eef2f7;
      --success: #0f766e;
      --shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: linear-gradient(180deg, #edf3fb 0%, var(--bg) 220px); color: var(--text); margin: 0; }
    .page { max-width: 1380px; margin: 0 auto; padding: 28px 28px 40px; }
    .page-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 18px;
    }
    .page-title h1 { margin: 0; font-size: 36px; line-height: 1.1; letter-spacing: -0.02em; }
    .page-title .subtitle { margin-top: 8px; color: var(--muted); font-size: 14px; }
    .layout { display: grid; grid-template-columns: 1fr; gap: 22px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .title { font-size: 24px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
    label { display: block; margin: 12px 0 7px; font-size: 14px; color: #1e293b; font-weight: 600; }
    input, select, button { font: inherit; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #c7d3e6;
      background: #fff;
      color: var(--text);
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #78a4ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: #fcfdff;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, background-color .18s ease, box-shadow .18s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
    }
    button:hover { background: var(--primary-dark); }
    button:active { transform: translateY(1px); }
    button.secondary { background: var(--secondary); box-shadow: 0 8px 18px rgba(100, 116, 139, 0.16); }
    button.ghost, .close-btn, .expand-btn { background: var(--ghost); color: #111827; box-shadow: none; }
    button:disabled { cursor: not-allowed; opacity: .55; box-shadow: none; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
    .server-item { margin-top: 10px; padding: 14px; border: 1px solid var(--line); border-radius: 14px; background: var(--card-soft); }
    .server-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .server-meta { margin-top: 8px; color: #475569; font-size: 13px; line-height: 1.5; }
    .server-controls { display: flex; gap: 8px; margin-top: 10px; }
    .server-controls button { flex: 1; }
    .filters { display: grid; grid-template-columns: repeat(2, minmax(280px,1fr)); gap: 16px; margin-bottom: 14px; }
    .field-card { border: 1px solid var(--line); border-radius: 16px; padding: 16px; background: var(--card-soft); min-height: 100%; }
    .field-title { margin: 0 0 12px; font-size: 15px; font-weight: 800; color: #1e293b; }
    .checkbox-row { display: flex; flex-wrap: wrap; gap: 16px; }
    .checkbox-row label, .check-list label { display: inline-flex; align-items: center; gap: 8px; margin: 0; }
    .checkbox-row input, .check-list input { width: auto; }
    .inline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .inline-grid.compact { grid-template-columns: 1.1fr .9fr; }
    .filter-grid { display: grid; grid-template-columns: repeat(4, minmax(220px, 1fr)); gap: 14px; }
    .filter-item { display: grid; gap: 8px; align-content: start; }
    .filter-item.span-2 { grid-column: span 2; }
    .filter-label { font-size: 13px; font-weight: 700; color: #334155; }
    .multi-dropdown { position: relative; }
    .multi-dropdown > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #c7d3e6;
      background: #fff;
      color: var(--text);
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }
    .multi-dropdown > summary::-webkit-details-marker { display: none; }
    .multi-dropdown > summary::after { content: "▾"; color: var(--muted); font-size: 13px; flex-shrink: 0; }
    .multi-dropdown[open] > summary {
      outline: none;
      border-color: #78a4ff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: #fcfdff;
    }
    .dropdown-panel {
      position: absolute;
      z-index: 20;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.14);
      padding: 12px;
      max-height: 280px;
      overflow: auto;
    }
    .dropdown-list { display: grid; gap: 10px; }
    .dropdown-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }
    .dropdown-list input { width: auto; }
    .stage-preset-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .stage-chip {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      color: #334155;
      cursor: pointer;
      user-select: none;
      transition: all .16s ease;
    }
    .stage-chip input { display: none; }
    .stage-chip.active {
      border-color: #8bb3ff;
      background: #eff5ff;
      color: var(--primary-dark);
      font-weight: 700;
    }
    .stage-custom-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .check-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      max-height: 210px;
      overflow: auto;
      margin-top: 12px;
      padding-right: 4px;
    }
    .summary { display: grid; grid-template-columns: repeat(6, minmax(110px,1fr)); gap: 12px; margin: 18px 0; }
    .metric { background: linear-gradient(180deg, #f8fbff 0%, #f4f8fd 100%); border: 1px solid var(--line); border-radius: 14px; padding: 14px; min-height: 94px; }
    .metric div { color: var(--muted); font-size: 13px; font-weight: 600; }
    .metric b { display: block; margin-top: 8px; font-size: 28px; line-height: 1; letter-spacing: -0.03em; }
    .status {
      min-height: 24px;
      white-space: pre-wrap;
      color: #334155;
      margin-top: 12px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
    }
    .results { max-height: 640px; overflow: auto; border: 1px solid var(--line); border-radius: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 12px 12px; font-size: 14px; text-align: left; vertical-align: top; }
    th { background: #f7faff; position: sticky; top: 0; z-index: 1; font-weight: 800; color: #1e293b; }
    tbody tr:hover { background: #fafcff; }
    .expand-btn { padding: 6px 12px; font-size: 13px; border-radius: 999px; }
    .detail-row { background: #fbfdff; }
    .detail-card { padding: 14px 0 6px; }
    .detail-table th { position: static; background: #eef4fb; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
    .topbar-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .server-badge {
      display:inline-flex; align-items:center; gap:8px; padding:10px 14px;
      border:1px solid var(--line); border-radius:999px; background:#fff; color:#334155; font-size:14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }
    .cache-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .cache-info { color:#475569; font-size:13px; padding: 10px 14px; background: rgba(255,255,255,.8); border-radius: 999px; border: 1px solid var(--line); }
    .overlay { position:fixed; inset:0; background:rgba(15,23,42,.35); display:none; align-items:center; justify-content:center; padding:24px; z-index:1000; }
    .overlay.show { display:flex; }
    .modal { width:min(860px, 100%); max-height:90vh; overflow:auto; background:#fff; border-radius:20px; border:1px solid var(--line); box-shadow:0 24px 80px rgba(15,23,42,.28); padding:22px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .modal-head h2 { margin:0; font-size:22px; }
    .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
    .server-list-panel { border:1px solid var(--line); border-radius:16px; padding:16px; background:var(--card-soft); }
    .server-empty { color:#64748b; font-size:13px; }
    .hint { color:#64748b; font-size:12px; margin-top:6px; }
    .query-actions { align-items: center; }
    .query-actions #query-btn { min-width: 132px; }
    .query-actions #export-btn { min-width: 120px; }
    .section-note { margin-top: 10px; color: var(--muted); font-size: 13px; }
    @media (max-width: 900px) {
      .page { padding: 20px 16px 32px; }
      .page-title h1 { font-size: 30px; }
      .modal-grid { grid-template-columns:1fr; }
      .filters { grid-template-columns: 1fr; }
      .filter-grid { grid-template-columns: 1fr; }
      .filter-item.span-2 { grid-column: span 1; }
      .inline-grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(100px,1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-title">
        <h1>项目阶段汇总服务</h1>
        <div class="subtitle">跨 SQL Server / MySQL 汇总项目阶段，按考试代码聚合展示，默认读取本地缓存。</div>
      </div>
    </div>
      <div class="topbar">
        <div class="topbar-left">
          <button id="open-server-modal" class="secondary">管理服务器</button>
          <button id="refresh-btn">更新数据</button>
          <div class="server-badge">已配置服务器：<strong id="server-count">0</strong></div>
          <div class="server-badge">已启用：<strong id="enabled-count">0</strong></div>
        </div>
        <div class="cache-bar">
          <div class="server-badge">缓存记录：<strong id="cache-record-count">0</strong></div>
          <div class="cache-info" id="cache-info">缓存尚未更新</div>
        </div>
      </div>
    <div class="layout">
      <div class="card">
        <div class="title">筛选</div>
        <div class="filters">
          <div class="field-card">
            <div class="filter-grid">
              <div class="filter-item">
                <div class="filter-label">状态</div>
                <details class="multi-dropdown">
                  <summary><span id="status-summary">已结束、正在进行、即将开始</span></summary>
                  <div class="dropdown-panel">
                    <div class="dropdown-list">
                      <label><input type="checkbox" class="status-filter" value="已经结束" checked> 已结束</label>
                      <label><input type="checkbox" class="status-filter" value="正在进行" checked> 正在进行</label>
                      <label><input type="checkbox" class="status-filter" value="即将开始" checked> 即将开始</label>
                    </div>
                  </div>
                </details>
              </div>
              <div class="filter-item">
                <div class="filter-label">阶段筛选</div>
                <details class="multi-dropdown">
                  <summary><span id="stage-summary">未选择阶段</span></summary>
                  <div class="dropdown-panel">
                    <div id="stage-options" class="dropdown-list">
                      <div class="server-empty">还没有可选阶段。</div>
                    </div>
                  </div>
                </details>
                <div class="stage-custom-row">
                  <input id="stage-keyword" placeholder="手动添加阶段，例如：体检">
                  <button id="add-stage-keyword" class="ghost" type="button">添加</button>
                </div>
              </div>
              <div class="filter-item">
                <div class="filter-label">时间范围</div>
                <div class="inline-grid">
                  <input id="range-start" type="datetime-local">
                  <input id="range-end" type="datetime-local">
                </div>
                <div class="hint">查询与时间范围有交集的项目阶段。</div>
              </div>
              <div class="filter-item span-2">
                <div class="filter-label">项目关键字</div>
                <input id="project-keyword" placeholder="项目关键字">
              </div>
              <div class="filter-item">
                <div class="filter-label">服务器</div>
                <details class="multi-dropdown">
                  <summary><span id="server-summary">全部服务器</span></summary>
                  <div class="dropdown-panel">
                    <div id="server-filter-options" class="dropdown-list">
                      <div class="server-empty">还没有可选服务器。</div>
                    </div>
                  </div>
                </details>
              </div>
              <div class="filter-item">
                <div class="filter-label">数据库关键字</div>
                <input id="database-keyword" placeholder="数据库关键字">
              </div>
              <div class="filter-item">
                <div class="filter-label">考试代码</div>
                <input id="exam-code-keyword" placeholder="考试代码">
              </div>
            </div>
          </div>
        </div>
        <div class="actions">
          <div class="query-actions actions" style="margin-top:0;">
          <button id="query-btn">开始查询</button>
          <button id="export-btn" class="secondary" disabled>导出 Excel</button>
          </div>
        </div>
        <div class="status" id="query-status">未开始查询</div>
        <div class="summary" id="summary-panel"></div>
        <div class="section-note">结果会自动忽略不包含业务表的数据库，只汇总符合条件的项目阶段。</div>
        <div class="results" style="margin-top: 14px;">
          <table>
            <thead>
              <tr>
                <th>服务器</th>
                <th>数据库</th>
                <th>考试代码</th>
                <th>项目名称</th>
                <th>当前阶段</th>
                <th style="width:80px;">操作</th>
              </tr>
            </thead>
            <tbody id="result-body">
              <tr><td colspan="6" class="muted">暂无结果</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="overlay" id="server-overlay">
      <div class="modal">
        <div class="modal-head">
          <h2>服务器配置</h2>
          <button id="close-server-modal" class="close-btn">关闭</button>
        </div>
        <div class="modal-grid">
          <div>
            <label>服务器名称</label>
            <input id="server-name" placeholder="例如：162">
            <label>数据库类型</label>
            <select id="server-type">
              <option>SQL Server</option>
              <option>MySQL</option>
            </select>
            <label>数据库地址</label>
            <input id="server-host" placeholder="例如：192.168.1.162">
            <label>端口</label>
            <input id="server-port" value="1433">
            <label>用户名</label>
            <input id="server-user">
            <label>密码</label>
            <input id="server-password" type="password">
            <div class="actions">
              <button id="save-server">新增/更新</button>
              <button id="clear-server" class="ghost">清空表单</button>
              <button id="test-server" class="secondary">测试连接</button>
            </div>
            <div class="status" id="server-status"></div>
          </div>
          <div class="server-list-panel">
            <div class="title">服务器列表</div>
            <div id="server-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let selectedIndex = null;
    let lastPayload = null;
    let serversCache = [];
    let stageOptionsCache = [];
    const presetStageNames = ["报名", "缴费", "交费", "准考证", "面试", "成绩"];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function collectCheckedValues(selector) {
      return Array.from(document.querySelectorAll(selector))
        .filter(item => item.checked)
        .map(item => item.value);
    }

    function updateDropdownSummary(summaryId, selector, emptyText, allText, totalCount = null) {
      const summary = document.getElementById(summaryId);
      if (!summary) return;
      const values = collectCheckedValues(selector);
      const effectiveTotal = totalCount ?? document.querySelectorAll(selector).length;
      if (!values.length) {
        summary.textContent = emptyText;
        return;
      }
      if (effectiveTotal > 0 && values.length === effectiveTotal) {
        summary.textContent = allText;
        return;
      }
      summary.textContent = values.join("、");
    }

    async function loadCacheInfo() {
      const response = await fetch("/api/cache-info");
      if (!response.ok) {
        throw new Error("读取缓存状态失败");
      }
      return response.json();
    }

    async function loadServers() {
      const response = await fetch("/api/servers");
      if (!response.ok) {
        throw new Error("读取服务器配置失败");
      }
      const data = await response.json();
      serversCache = Array.isArray(data) ? data : [];
      return serversCache;
    }

    async function saveServers(servers) {
      const response = await fetch("/api/servers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(servers)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || "保存服务器配置失败");
      }
      serversCache = servers;
    }

    function fillForm(server) {
      document.getElementById("server-name").value = server?.name || "";
      document.getElementById("server-type").value = server?.databaseType || "SQL Server";
      document.getElementById("server-host").value = server?.host || "";
      document.getElementById("server-port").value = server?.port || "1433";
      document.getElementById("server-user").value = server?.username || "";
      document.getElementById("server-password").value = server?.password || "";
    }

    function renderServerFilterOptions() {
      const container = document.getElementById("server-filter-options");
      if (!container) return;

      const selected = new Set(collectCheckedValues(".server-filter"));
      const options = serversCache
        .map(item => item.name?.trim())
        .filter(Boolean)
        .filter((name, index, list) => list.findIndex(item => item.toLowerCase() === name.toLowerCase()) === index)
        .sort((a, b) => a.localeCompare(b, "zh-CN"));

      if (!options.length) {
        container.innerHTML = '<div class="server-empty">还没有可选服务器。</div>';
        updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", 0);
        return;
      }

      container.innerHTML = options.map(name => `
        <label><input type="checkbox" class="server-filter" value="${escapeHtml(name)}" ${selected.has(name) ? "checked" : ""}> ${escapeHtml(name)}</label>
      `).join("");
      updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", options.length);
    }

    function renderServers() {
      const container = document.getElementById("server-list");
      const servers = serversCache;
      document.getElementById("server-count").textContent = String(servers.length);
      document.getElementById("enabled-count").textContent = String(servers.filter(item => item.enabled).length);
      container.innerHTML = "";
      if (!servers.length) {
        container.innerHTML = '<div class="server-empty">还没有添加服务器。</div>';
        renderServerFilterOptions();
        return;
      }
      servers.forEach((server, index) => {
        const item = document.createElement("div");
        item.className = "server-item";
        item.innerHTML = `
          <div class="server-head">
            <strong>${server.name}</strong>
            <label><input type="checkbox" data-action="toggle" data-index="${index}" ${server.enabled ? "checked" : ""}> 启用</label>
          </div>
          <div class="server-meta">${server.databaseType || "SQL Server"} / ${server.host}:${server.port} / ${server.username}</div>
          <div class="server-controls">
            <button class="ghost" data-action="edit" data-index="${index}">编辑</button>
            <button class="ghost" data-action="delete" data-index="${index}">删除</button>
          </div>`;
        container.appendChild(item);
      });
      renderServerFilterOptions();
    }

    function enabledServers() {
      return serversCache.filter(item => item.enabled);
    }

    function setServerStatus(text) {
      document.getElementById("server-status").textContent = text;
    }

    function setQueryStatus(text) {
      document.getElementById("query-status").textContent = text;
    }

    function renderCacheInfo(info) {
      document.getElementById("cache-record-count").textContent = String(info?.recordCount || 0);
      if (!info?.hasData || !info?.refreshedAt) {
        document.getElementById("cache-info").textContent = "缓存尚未更新，请先点击“更新数据”。";
        return;
      }

      document.getElementById("cache-info").textContent =
        `上次更新：${formatDateTime(info.refreshedAt)}，启用服务器 ${info.enabledServers} 台，遍历数据库 ${info.visitedDatabases} 个，业务库 ${info.matchedDatabases} 个。`;
    }

    function showServerModal() {
      document.getElementById("server-overlay").classList.add("show");
    }

    function hideServerModal() {
      document.getElementById("server-overlay").classList.remove("show");
    }

    function buildPayload() {
      return {
        servers: enabledServers(),
        statusFilters: collectCheckedValues(".status-filter"),
        stageKeyword: "",
        stageNames: collectCheckedValues(".stage-filter"),
        serverNames: collectCheckedValues(".server-filter"),
        projectKeyword: document.getElementById("project-keyword").value.trim(),
        serverKeyword: "",
        databaseKeyword: document.getElementById("database-keyword").value.trim(),
        examCodeKeyword: document.getElementById("exam-code-keyword").value.trim()
        ,rangeStart: document.getElementById("range-start").value || null
        ,rangeEnd: document.getElementById("range-end").value || null
      };
    }

    function buildStagePayload() {
      const payload = buildPayload();
      payload.stageKeyword = "";
      payload.stageNames = [];
      return payload;
    }

    function renderSummary(summary) {
      document.getElementById("summary-panel").innerHTML = `
        <div class="metric">启用服务器<b>${summary.enabledServers}</b></div>
        <div class="metric">遍历数据库<b>${summary.visitedDatabases}</b></div>
        <div class="metric">匹配业务库<b>${summary.matchedDatabases}</b></div>
        <div class="metric">已结束<b>${summary.endedCount}</b></div>
        <div class="metric">正在进行<b>${summary.ongoingCount}</b></div>
        <div class="metric">即将开始<b>${summary.upcomingCount}</b></div>`;
    }

    function renderStageOptions(stageNames) {
      const selected = new Set(collectCheckedValues(".stage-filter"));
      const manualValue = document.getElementById("stage-keyword").value.trim();
      const allOptions = [...presetStageNames, ...(Array.isArray(stageNames) ? stageNames : []), ...selected];
      if (manualValue) {
        allOptions.push(manualValue);
      }
      stageOptionsCache = allOptions
        .map(item => item?.trim())
        .filter(Boolean)
        .filter((item, index, list) => list.findIndex(value => value.toLowerCase() === item.toLowerCase()) === index)
        .sort((a, b) => a.localeCompare(b, "zh-CN"));
      const container = document.getElementById("stage-options");
      if (!stageOptionsCache.length) {
        container.innerHTML = '<div class="server-empty">还没有可选阶段。</div>';
        updateDropdownSummary("stage-summary", ".stage-filter", "未选择阶段", "全部阶段", 0);
        return;
      }
      container.innerHTML = stageOptionsCache.map(name => `
        <label><input type="checkbox" class="stage-filter" value="${escapeHtml(name)}" ${selected.has(name) ? "checked" : ""}> ${escapeHtml(name)}</label>
      `).join("");
      updateDropdownSummary("stage-summary", ".stage-filter", "未选择阶段", "全部阶段", stageOptionsCache.length);
    }

    function formatDateTime(value) {
      if (!value) return "";
      return value.replace("T", " ").slice(0, 19);
    }

    function renderGroups(groups) {
      const body = document.getElementById("result-body");
      if (!groups.length) {
        body.innerHTML = '<tr><td colspan="6" class="muted">没有符合条件的结果</td></tr>';
        return;
      }

      body.innerHTML = groups.map((item, index) => `
        <tr class="group-row">
          <td>${item.serverName}</td>
          <td>${item.databaseName}</td>
          <td>${item.examCode}</td>
          <td>${item.projectName}</td>
          <td>${(item.statuses || []).join("、")}</td>
          <td><button class="expand-btn" type="button" data-group-index="${index}">展开</button></td>
        </tr>
        <tr class="detail-row" id="detail-row-${index}" style="display:none;">
          <td colspan="6">
            <div class="detail-card">
              <table class="detail-table">
                <thead>
                  <tr>
                    <th>阶段名称</th>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>当前状态</th>
                  </tr>
                </thead>
                <tbody>
                  ${(item.stages || []).map(stage => `
                    <tr>
                      <td>${stage.stageName}</td>
                      <td>${formatDateTime(stage.startTime)}</td>
                      <td>${formatDateTime(stage.endTime)}</td>
                      <td>${stage.status}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </td>
        </tr>`).join("");
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || "请求失败");
      return data;
    }

    document.getElementById("open-server-modal").addEventListener("click", showServerModal);
    document.getElementById("close-server-modal").addEventListener("click", hideServerModal);
    document.getElementById("server-overlay").addEventListener("click", (event) => {
      if (event.target === document.getElementById("server-overlay")) {
        hideServerModal();
      }
    });

    document.getElementById("save-server").addEventListener("click", async () => {
      const server = {
        name: document.getElementById("server-name").value.trim(),
        databaseType: document.getElementById("server-type").value,
        host: document.getElementById("server-host").value.trim(),
        port: Number(document.getElementById("server-port").value.trim() || "1433"),
        username: document.getElementById("server-user").value.trim(),
        password: document.getElementById("server-password").value.trim(),
        enabled: true
      };

      if (!server.name || !server.host || !server.username || !server.password) {
        setServerStatus("请完整填写服务器信息。");
        return;
      }

      const servers = [...serversCache];
      if (selectedIndex === null) servers.push(server);
      else servers[selectedIndex] = { ...servers[selectedIndex], ...server };
      try {
        await saveServers(servers);
        selectedIndex = null;
        fillForm(null);
        setServerStatus("服务器配置已保存到本机加密文件。");
        renderServers();
        hideServerModal();
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    document.getElementById("clear-server").addEventListener("click", () => {
      selectedIndex = null;
      fillForm(null);
      setServerStatus("");
    });

    document.getElementById("server-type").addEventListener("change", (event) => {
      const value = event.target.value;
      const port = document.getElementById("server-port");
      if (!port.value || port.value === "1433" || port.value === "3306") {
        port.value = value === "MySQL" ? "3306" : "1433";
      }
    });

    document.getElementById("server-list").addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.dataset.action;
      const index = Number(target.dataset.index);
      const servers = [...serversCache];
      if (Number.isNaN(index) || !servers[index]) return;

      if (action === "edit") {
        selectedIndex = index;
        fillForm(servers[index]);
        showServerModal();
      } else if (action === "delete") {
        servers.splice(index, 1);
        try {
          await saveServers(servers);
          renderServers();
          setServerStatus("服务器配置已删除。");
        } catch (error) {
          setServerStatus(error.message);
        }
      }
    });

    document.getElementById("server-list").addEventListener("change", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.dataset.action !== "toggle") return;
      const index = Number(target.dataset.index);
      const servers = [...serversCache];
      if (Number.isNaN(index) || !servers[index]) return;
      servers[index].enabled = target.checked;
      try {
        await saveServers(servers);
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    document.getElementById("test-server").addEventListener("click", async () => {
      try {
        setServerStatus("正在测试连接...");
        const result = await postJson("/api/test", {
          server: {
            name: document.getElementById("server-name").value.trim(),
            databaseType: document.getElementById("server-type").value,
            host: document.getElementById("server-host").value.trim(),
            port: Number(document.getElementById("server-port").value.trim() || "1433"),
            username: document.getElementById("server-user").value.trim(),
            password: document.getElementById("server-password").value.trim(),
            enabled: true
          }
        });
        setServerStatus(`连接成功。遍历数据库 ${result.visited_databases} 个。`);
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    async function refreshStageOptions(showStatus = false) {
      try {
        if (showStatus) {
          setQueryStatus("正在从缓存加载阶段选项...");
        }
        const result = await postJson("/api/stages", buildStagePayload());
        renderStageOptions(result);
        if (showStatus) {
          setQueryStatus(`已从缓存加载阶段选项 ${result.length} 个。`);
        }
      } catch (error) {
        if (showStatus) {
          setQueryStatus(error.message);
        }
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", async () => {
      try {
        setQueryStatus("正在更新缓存数据，请稍候...");
        document.getElementById("refresh-btn").disabled = true;
        const result = await postJson("/api/refresh", { servers: enabledServers() });
        renderCacheInfo(await loadCacheInfo());
        setQueryStatus(`更新完成：启用服务器 ${result.enabledServers} 台，遍历数据库 ${result.visitedDatabases} 个，匹配业务库 ${result.matchedDatabases} 个，阶段 ${result.recordCount} 条。`);
        await refreshStageOptions();
        if (lastPayload) {
          const queryResult = await postJson("/api/query", lastPayload);
          renderSummary(queryResult);
          renderGroups(queryResult.groups || []);
          document.getElementById("export-btn").disabled = (queryResult.records || []).length === 0;
        }
      } catch (error) {
        setQueryStatus(error.message);
      } finally {
        document.getElementById("refresh-btn").disabled = false;
      }
    });

    document.getElementById("query-btn").addEventListener("click", async () => {
      try {
        lastPayload = buildPayload();
        setQueryStatus("正在查询缓存，请稍候...");
        const result = await postJson("/api/query", lastPayload);
        renderSummary(result);
        renderGroups(result.groups || []);
        document.getElementById("export-btn").disabled = (result.records || []).length === 0;
        setQueryStatus(`缓存查询完成：启用服务器 ${result.enabledServers} 台，遍历数据库 ${result.visitedDatabases} 个，匹配业务库 ${result.matchedDatabases} 个，项目 ${((result.groups || []).length)} 个，阶段 ${(result.records || []).length} 条。`);
      } catch (error) {
        document.getElementById("export-btn").disabled = true;
        setQueryStatus(error.message);
      }
    });

    document.getElementById("result-body").addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains("expand-btn")) return;
      const index = target.dataset.groupIndex;
      const row = document.getElementById(`detail-row-${index}`);
      if (!row) return;
      const visible = row.style.display !== "none";
      row.style.display = visible ? "none" : "";
      target.textContent = visible ? "展开" : "收起";
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.classList.contains("status-filter")) {
        updateDropdownSummary("status-summary", ".status-filter", "未选择状态", "全部状态", 3);
      }
      if (target.classList.contains("stage-filter")) {
        updateDropdownSummary("stage-summary", ".stage-filter", "未选择阶段", "全部阶段", stageOptionsCache.length);
      }
      if (target.classList.contains("server-filter")) {
        updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", document.querySelectorAll(".server-filter").length);
      }
    });

    document.getElementById("add-stage-keyword").addEventListener("click", () => {
      const input = document.getElementById("stage-keyword");
      const value = input.value.trim();
      if (!value) return;

      if (!stageOptionsCache.some(item => item.toLowerCase() === value.toLowerCase())) {
        stageOptionsCache.push(value);
      }
      renderStageOptions(stageOptionsCache);
      const checkbox = Array.from(document.querySelectorAll(".stage-filter"))
        .find(item => item.value.toLowerCase() === value.toLowerCase());
      if (checkbox) {
        checkbox.checked = true;
      }
      updateDropdownSummary("stage-summary", ".stage-filter", "未选择阶段", "全部阶段", stageOptionsCache.length);
      input.value = "";
    });

    document.getElementById("export-btn").addEventListener("click", async () => {
      if (!lastPayload) return;
      try {
        const response = await fetch("/api/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastPayload)
        });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "导出失败");
        }
        const blob = await response.blob();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "项目阶段汇总.xlsx";
        link.click();
      } catch (error) {
        setQueryStatus(error.message);
      }
    });

    (async () => {
      try {
        await loadServers();
        renderServers();
        updateDropdownSummary("status-summary", ".status-filter", "未选择状态", "全部状态", 3);
        await refreshStageOptions();
        renderCacheInfo(await loadCacheInfo());
      } catch (error) {
        setServerStatus(error.message);
      }
    })();
  </script>
</body>
</html>
