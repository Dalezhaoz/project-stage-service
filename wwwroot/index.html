<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目阶段汇总服务</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #f6f8fb; color: #0f172a; margin: 0; }
    .page { max-width: 1280px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 18px; font-size: 28px; }
    .layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .card { background: #fff; border: 1px solid #d8dee8; border-radius: 12px; padding: 16px; box-shadow: 0 4px 18px rgba(15,23,42,.06); }
    .title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    label { display: block; margin: 10px 0 6px; font-size: 14px; }
    input, select, button { font: inherit; }
    input, select { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 8px; border: 1px solid #c4ccda; }
    button { border: none; border-radius: 8px; padding: 10px 14px; background: #2563eb; color: #fff; cursor: pointer; }
    button.secondary { background: #64748b; }
    button.ghost { background: #e5e7eb; color: #111827; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .server-item { margin-top: 10px; padding: 12px; border: 1px solid #d8dee8; border-radius: 10px; background: #f8fafc; }
    .server-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .server-meta { margin-top: 6px; color: #475569; font-size: 13px; }
    .server-controls { display: flex; gap: 8px; margin-top: 10px; }
    .server-controls button { flex: 1; }
    .filters { display: grid; grid-template-columns: repeat(2, minmax(260px,1fr)); gap: 14px; margin-bottom: 12px; }
    .field-card { border: 1px solid #d8dee8; border-radius: 12px; padding: 14px; background: #f8fafc; }
    .field-title { margin: 0 0 10px; font-size: 14px; font-weight: 700; color: #1e293b; }
    .checkbox-row { display: flex; flex-wrap: wrap; gap: 14px; }
    .checkbox-row label, .check-list label { display: inline-flex; align-items: center; gap: 8px; margin: 0; }
    .checkbox-row input, .check-list input { width: auto; }
    .inline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .check-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; max-height: 180px; overflow: auto; margin-top: 10px; }
    .summary { display: grid; grid-template-columns: repeat(6, minmax(100px,1fr)); gap: 10px; margin: 14px 0; }
    .metric { background: #f8fafc; border: 1px solid #d8dee8; border-radius: 10px; padding: 12px; }
    .metric b { display: block; margin-top: 6px; font-size: 22px; }
    .status { min-height: 24px; white-space: pre-wrap; color: #334155; margin-top: 10px; }
    .results { max-height: 620px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #d8dee8; padding: 8px 10px; font-size: 14px; text-align: left; }
    th { background: #f8fafc; position: sticky; top: 0; }
    .expand-btn { padding: 4px 10px; font-size: 13px; background: #e5e7eb; color: #111827; border-radius: 6px; }
    .detail-row { background: #fbfcfe; }
    .detail-card { padding: 10px 0; }
    .detail-table th { position: static; background: #eef2f7; }
    .muted { color: #64748b; font-size: 13px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .topbar-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .server-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid #d8dee8; border-radius:999px; background:#fff; color:#334155; font-size:14px; }
    .cache-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .cache-info { color:#475569; font-size:13px; }
    .overlay { position:fixed; inset:0; background:rgba(15,23,42,.35); display:none; align-items:center; justify-content:center; padding:24px; z-index:1000; }
    .overlay.show { display:flex; }
    .modal { width:min(780px, 100%); max-height:90vh; overflow:auto; background:#fff; border-radius:16px; border:1px solid #d8dee8; box-shadow:0 24px 80px rgba(15,23,42,.28); padding:20px; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .modal-head h2 { margin:0; font-size:22px; }
    .close-btn { background:#e5e7eb; color:#111827; }
    .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
    .server-list-panel { border:1px solid #d8dee8; border-radius:12px; padding:14px; background:#f8fafc; }
    .server-empty { color:#64748b; font-size:13px; }
    .hint { color:#64748b; font-size:12px; margin-top:6px; }
    @media (max-width: 900px) {
      .modal-grid { grid-template-columns:1fr; }
      .filters { grid-template-columns: 1fr; }
      .inline-grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(100px,1fr)); }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>项目阶段汇总服务</h1>
      <div class="topbar">
        <div class="topbar-left">
          <button id="open-server-modal" class="secondary">管理服务器</button>
          <button id="refresh-btn">更新数据</button>
          <div class="server-badge">已配置服务器：<strong id="server-count">0</strong></div>
          <div class="server-badge">已启用：<strong id="enabled-count">0</strong></div>
        </div>
        <div class="cache-bar">
          <div class="server-badge">缓存记录：<strong id="cache-record-count">0</strong></div>
          <div class="cache-info" id="cache-info">缓存尚未更新</div>
        </div>
      </div>
    <div class="layout">
      <div class="card">
        <div class="title">查询条件</div>
        <div class="filters">
          <div class="field-card">
            <div class="field-title">状态</div>
            <div class="checkbox-row">
              <label><input type="checkbox" class="status-filter" value="已经结束"> 已结束</label>
              <label><input type="checkbox" class="status-filter" value="正在进行" checked> 正在进行</label>
              <label><input type="checkbox" class="status-filter" value="即将开始" checked> 即将开始</label>
            </div>
          </div>
          <div class="field-card">
            <div class="field-title">时间范围</div>
            <div class="inline-grid">
              <input id="range-start" type="datetime-local">
              <input id="range-end" type="datetime-local">
            </div>
            <div class="hint">查询与时间范围有交集的项目阶段。</div>
          </div>
          <div class="field-card">
            <div class="field-title">阶段筛选</div>
            <div class="inline-grid">
              <input id="stage-keyword" placeholder="阶段关键字，例如：报名">
              <button id="load-stages-btn" class="ghost" type="button">刷新阶段选项</button>
            </div>
            <div id="stage-options" class="check-list">
              <div class="server-empty">还没有加载阶段选项。</div>
            </div>
          </div>
          <div class="field-card">
            <div class="field-title">项目筛选</div>
            <input id="project-keyword" placeholder="项目关键字">
          </div>
        </div>
        <div class="actions">
          <button id="query-btn">开始查询</button>
          <button id="export-btn" class="secondary" disabled>导出 Excel</button>
        </div>
        <div class="status" id="query-status">未开始查询</div>
        <div class="summary" id="summary-panel"></div>
        <div class="muted">结果会自动忽略不包含业务表的数据库，只汇总符合条件的项目阶段。</div>
        <div class="results" style="margin-top: 14px;">
          <table>
            <thead>
              <tr>
                <th style="width:80px;">操作</th>
                <th>服务器</th>
                <th>数据库</th>
                <th>考试代码</th>
                <th>项目名称</th>
                <th>当前阶段</th>
              </tr>
            </thead>
            <tbody id="result-body">
              <tr><td colspan="6" class="muted">暂无结果</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="overlay" id="server-overlay">
      <div class="modal">
        <div class="modal-head">
          <h2>服务器配置</h2>
          <button id="close-server-modal" class="close-btn">关闭</button>
        </div>
        <div class="modal-grid">
          <div>
            <label>服务器名称</label>
            <input id="server-name" placeholder="例如：162">
            <label>数据库类型</label>
            <select id="server-type">
              <option>SQL Server</option>
              <option>MySQL</option>
            </select>
            <label>数据库地址</label>
            <input id="server-host" placeholder="例如：192.168.1.162">
            <label>端口</label>
            <input id="server-port" value="1433">
            <label>用户名</label>
            <input id="server-user">
            <label>密码</label>
            <input id="server-password" type="password">
            <div class="actions">
              <button id="save-server">新增/更新</button>
              <button id="clear-server" class="ghost">清空表单</button>
              <button id="test-server" class="secondary">测试连接</button>
            </div>
            <div class="status" id="server-status"></div>
          </div>
          <div class="server-list-panel">
            <div class="title">服务器列表</div>
            <div id="server-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let selectedIndex = null;
    let lastPayload = null;
    let serversCache = [];
    let stageOptionsCache = [];

    async function loadCacheInfo() {
      const response = await fetch("/api/cache-info");
      if (!response.ok) {
        throw new Error("读取缓存状态失败");
      }
      return response.json();
    }

    async function loadServers() {
      const response = await fetch("/api/servers");
      if (!response.ok) {
        throw new Error("读取服务器配置失败");
      }
      const data = await response.json();
      serversCache = Array.isArray(data) ? data : [];
      return serversCache;
    }

    async function saveServers(servers) {
      const response = await fetch("/api/servers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(servers)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || "保存服务器配置失败");
      }
      serversCache = servers;
    }

    function fillForm(server) {
      document.getElementById("server-name").value = server?.name || "";
      document.getElementById("server-type").value = server?.databaseType || "SQL Server";
      document.getElementById("server-host").value = server?.host || "";
      document.getElementById("server-port").value = server?.port || "1433";
      document.getElementById("server-user").value = server?.username || "";
      document.getElementById("server-password").value = server?.password || "";
    }

    function renderServers() {
      const container = document.getElementById("server-list");
      const servers = serversCache;
      document.getElementById("server-count").textContent = String(servers.length);
      document.getElementById("enabled-count").textContent = String(servers.filter(item => item.enabled).length);
      container.innerHTML = "";
      if (!servers.length) {
        container.innerHTML = '<div class="server-empty">还没有添加服务器。</div>';
        return;
      }
      servers.forEach((server, index) => {
        const item = document.createElement("div");
        item.className = "server-item";
        item.innerHTML = `
          <div class="server-head">
            <strong>${server.name}</strong>
            <label><input type="checkbox" data-action="toggle" data-index="${index}" ${server.enabled ? "checked" : ""}> 启用</label>
          </div>
          <div class="server-meta">${server.databaseType || "SQL Server"} / ${server.host}:${server.port} / ${server.username}</div>
          <div class="server-controls">
            <button class="ghost" data-action="edit" data-index="${index}">编辑</button>
            <button class="ghost" data-action="delete" data-index="${index}">删除</button>
          </div>`;
        container.appendChild(item);
      });
    }

    function enabledServers() {
      return serversCache.filter(item => item.enabled);
    }

    function setServerStatus(text) {
      document.getElementById("server-status").textContent = text;
    }

    function setQueryStatus(text) {
      document.getElementById("query-status").textContent = text;
    }

    function renderCacheInfo(info) {
      document.getElementById("cache-record-count").textContent = String(info?.recordCount || 0);
      if (!info?.hasData || !info?.refreshedAt) {
        document.getElementById("cache-info").textContent = "缓存尚未更新，请先点击“更新数据”。";
        return;
      }

      document.getElementById("cache-info").textContent =
        `上次更新：${formatDateTime(info.refreshedAt)}，启用服务器 ${info.enabledServers} 台，遍历数据库 ${info.visitedDatabases} 个，业务库 ${info.matchedDatabases} 个。`;
    }

    function showServerModal() {
      document.getElementById("server-overlay").classList.add("show");
    }

    function hideServerModal() {
      document.getElementById("server-overlay").classList.remove("show");
    }

    function buildPayload() {
      return {
        servers: enabledServers(),
        statusFilters: Array.from(document.querySelectorAll(".status-filter:checked")).map(item => item.value),
        stageKeyword: document.getElementById("stage-keyword").value.trim(),
        stageNames: Array.from(document.querySelectorAll(".stage-filter:checked")).map(item => item.value),
        projectKeyword: document.getElementById("project-keyword").value.trim()
        ,rangeStart: document.getElementById("range-start").value || null
        ,rangeEnd: document.getElementById("range-end").value || null
      };
    }

    function renderSummary(summary) {
      document.getElementById("summary-panel").innerHTML = `
        <div class="metric">启用服务器<b>${summary.enabledServers}</b></div>
        <div class="metric">遍历数据库<b>${summary.visitedDatabases}</b></div>
        <div class="metric">匹配业务库<b>${summary.matchedDatabases}</b></div>
        <div class="metric">已结束<b>${summary.endedCount}</b></div>
        <div class="metric">正在进行<b>${summary.ongoingCount}</b></div>
        <div class="metric">即将开始<b>${summary.upcomingCount}</b></div>`;
    }

    function renderStageOptions(stageNames) {
      stageOptionsCache = Array.isArray(stageNames) ? stageNames : [];
      const container = document.getElementById("stage-options");
      if (!stageOptionsCache.length) {
        container.innerHTML = '<div class="server-empty">没有可选阶段，先检查已启用服务器或点击“刷新阶段选项”。</div>';
        return;
      }
      container.innerHTML = stageOptionsCache.map(name => `
        <label><input type="checkbox" class="stage-filter" value="${name}"> ${name}</label>
      `).join("");
    }

    function formatDateTime(value) {
      if (!value) return "";
      return value.replace("T", " ").slice(0, 19);
    }

    function renderGroups(groups) {
      const body = document.getElementById("result-body");
      if (!groups.length) {
        body.innerHTML = '<tr><td colspan="6" class="muted">没有符合条件的结果</td></tr>';
        return;
      }

      body.innerHTML = groups.map((item, index) => `
        <tr class="group-row">
          <td><button class="expand-btn" type="button" data-group-index="${index}">展开</button></td>
          <td>${item.serverName}</td>
          <td>${item.databaseName}</td>
          <td>${item.examCode}</td>
          <td>${item.projectName}</td>
          <td>${(item.statuses || []).join("、")}</td>
        </tr>
        <tr class="detail-row" id="detail-row-${index}" style="display:none;">
          <td colspan="6">
            <div class="detail-card">
              <table class="detail-table">
                <thead>
                  <tr>
                    <th>阶段名称</th>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>当前状态</th>
                  </tr>
                </thead>
                <tbody>
                  ${(item.stages || []).map(stage => `
                    <tr>
                      <td>${stage.stageName}</td>
                      <td>${formatDateTime(stage.startTime)}</td>
                      <td>${formatDateTime(stage.endTime)}</td>
                      <td>${stage.status}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </td>
        </tr>`).join("");
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || "请求失败");
      return data;
    }

    document.getElementById("open-server-modal").addEventListener("click", showServerModal);
    document.getElementById("close-server-modal").addEventListener("click", hideServerModal);
    document.getElementById("server-overlay").addEventListener("click", (event) => {
      if (event.target === document.getElementById("server-overlay")) {
        hideServerModal();
      }
    });

    document.getElementById("save-server").addEventListener("click", async () => {
      const server = {
        name: document.getElementById("server-name").value.trim(),
        databaseType: document.getElementById("server-type").value,
        host: document.getElementById("server-host").value.trim(),
        port: Number(document.getElementById("server-port").value.trim() || "1433"),
        username: document.getElementById("server-user").value.trim(),
        password: document.getElementById("server-password").value.trim(),
        enabled: true
      };

      if (!server.name || !server.host || !server.username || !server.password) {
        setServerStatus("请完整填写服务器信息。");
        return;
      }

      const servers = [...serversCache];
      if (selectedIndex === null) servers.push(server);
      else servers[selectedIndex] = { ...servers[selectedIndex], ...server };
      try {
        await saveServers(servers);
        selectedIndex = null;
        fillForm(null);
        setServerStatus("服务器配置已保存到本机加密文件。");
        renderServers();
        hideServerModal();
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    document.getElementById("clear-server").addEventListener("click", () => {
      selectedIndex = null;
      fillForm(null);
      setServerStatus("");
    });

    document.getElementById("server-type").addEventListener("change", (event) => {
      const value = event.target.value;
      const port = document.getElementById("server-port");
      if (!port.value || port.value === "1433" || port.value === "3306") {
        port.value = value === "MySQL" ? "3306" : "1433";
      }
    });

    document.getElementById("server-list").addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.dataset.action;
      const index = Number(target.dataset.index);
      const servers = [...serversCache];
      if (Number.isNaN(index) || !servers[index]) return;

      if (action === "edit") {
        selectedIndex = index;
        fillForm(servers[index]);
        showServerModal();
      } else if (action === "delete") {
        servers.splice(index, 1);
        try {
          await saveServers(servers);
          renderServers();
          setServerStatus("服务器配置已删除。");
        } catch (error) {
          setServerStatus(error.message);
        }
      }
    });

    document.getElementById("server-list").addEventListener("change", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.dataset.action !== "toggle") return;
      const index = Number(target.dataset.index);
      const servers = [...serversCache];
      if (Number.isNaN(index) || !servers[index]) return;
      servers[index].enabled = target.checked;
      try {
        await saveServers(servers);
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    document.getElementById("test-server").addEventListener("click", async () => {
      try {
        setServerStatus("正在测试连接...");
        const result = await postJson("/api/test", {
          server: {
            name: document.getElementById("server-name").value.trim(),
            databaseType: document.getElementById("server-type").value,
            host: document.getElementById("server-host").value.trim(),
            port: Number(document.getElementById("server-port").value.trim() || "1433"),
            username: document.getElementById("server-user").value.trim(),
            password: document.getElementById("server-password").value.trim(),
            enabled: true
          }
        });
        setServerStatus(`连接成功。遍历数据库 ${result.visited_databases} 个。`);
      } catch (error) {
        setServerStatus(error.message);
      }
    });

    document.getElementById("load-stages-btn").addEventListener("click", async () => {
      try {
        setQueryStatus("正在从缓存加载阶段选项...");
        const payload = { servers: enabledServers(), statusFilters: [], stageKeyword: "", stageNames: [], projectKeyword: "", rangeStart: null, rangeEnd: null };
        const result = await postJson("/api/stages", payload);
        renderStageOptions(result);
        setQueryStatus(`已从缓存加载阶段选项 ${result.length} 个。`);
      } catch (error) {
        setQueryStatus(error.message);
      }
    });

    document.getElementById("refresh-btn").addEventListener("click", async () => {
      try {
        setQueryStatus("正在更新缓存数据，请稍候...");
        document.getElementById("refresh-btn").disabled = true;
        const result = await postJson("/api/refresh", { servers: enabledServers() });
        renderCacheInfo(await loadCacheInfo());
        setQueryStatus(`更新完成：启用服务器 ${result.enabledServers} 台，遍历数据库 ${result.visitedDatabases} 个，匹配业务库 ${result.matchedDatabases} 个，阶段 ${result.recordCount} 条。`);
        const stagePayload = { servers: enabledServers(), statusFilters: [], stageKeyword: "", stageNames: [], projectKeyword: "", rangeStart: null, rangeEnd: null };
        renderStageOptions(await postJson("/api/stages", stagePayload));
        if (lastPayload) {
          const queryResult = await postJson("/api/query", lastPayload);
          renderSummary(queryResult);
          renderGroups(queryResult.groups || []);
          document.getElementById("export-btn").disabled = (queryResult.records || []).length === 0;
        }
      } catch (error) {
        setQueryStatus(error.message);
      } finally {
        document.getElementById("refresh-btn").disabled = false;
      }
    });

    document.getElementById("query-btn").addEventListener("click", async () => {
      try {
        lastPayload = buildPayload();
        setQueryStatus("正在查询缓存，请稍候...");
        const result = await postJson("/api/query", lastPayload);
        renderSummary(result);
        renderGroups(result.groups || []);
        document.getElementById("export-btn").disabled = (result.records || []).length === 0;
        setQueryStatus(`缓存查询完成：启用服务器 ${result.enabledServers} 台，遍历数据库 ${result.visitedDatabases} 个，匹配业务库 ${result.matchedDatabases} 个，项目 ${((result.groups || []).length)} 个，阶段 ${(result.records || []).length} 条。`);
      } catch (error) {
        document.getElementById("export-btn").disabled = true;
        setQueryStatus(error.message);
      }
    });

    document.getElementById("result-body").addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains("expand-btn")) return;
      const index = target.dataset.groupIndex;
      const row = document.getElementById(`detail-row-${index}`);
      if (!row) return;
      const visible = row.style.display !== "none";
      row.style.display = visible ? "none" : "";
      target.textContent = visible ? "展开" : "收起";
    });

    document.getElementById("export-btn").addEventListener("click", async () => {
      if (!lastPayload) return;
      try {
        const response = await fetch("/api/export", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastPayload)
        });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "导出失败");
        }
        const blob = await response.blob();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "项目阶段汇总.xlsx";
        link.click();
      } catch (error) {
        setQueryStatus(error.message);
      }
    });

    (async () => {
      try {
        await loadServers();
        renderServers();
        renderStageOptions([]);
        renderCacheInfo(await loadCacheInfo());
      } catch (error) {
        setServerStatus(error.message);
      }
    })();
  </script>
</body>
</html>
