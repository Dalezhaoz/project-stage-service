<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目阶段汇总服务</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --card-soft: #fafbfc;
      --line: #e5e7eb;
      --line-soft: #f0f1f3;
      --text: #111827;
      --muted: #6b7280;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --primary-border: #c7d2fe;
      --secondary: #6b7280;
      --secondary-hover: #4b5563;
      --success: #059669;
      --success-light: #ecfdf5;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --danger: #dc2626;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -2px rgba(0,0,0,.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --transition: .15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Layout ---- */
    .page { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .page-header {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      gap: 16px; margin-bottom: 20px;
    }
    .page-title h1 {
      font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
    }
    .page-title .subtitle {
      margin-top: 4px; color: var(--muted); font-size: 13px;
    }
    .page-title-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .layout { display: grid; gap: 20px; }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow);
    }
    .title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }

    /* ---- Form Elements ---- */
    label { display: block; margin: 0 0 4px; font-size: 13px; color: #374151; font-weight: 600; }
    input, select, button { font: inherit; }
    input, select {
      width: 100%; padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--line); background: #fff; color: var(--text);
      font-size: 14px; transition: border-color var(--transition), box-shadow var(--transition);
    }
    input:focus, select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    input::placeholder { color: #9ca3af; }

    /* ---- Buttons ---- */
    button {
      border: none; border-radius: var(--radius-sm); padding: 8px 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow); }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
    .btn-secondary:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn-ghost { background: transparent; color: #374151; }
    .btn-ghost:hover { background: #f3f4f6; }
    .btn-danger { background: #fff; color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    /* Legacy class compat */
    button:not([class*="btn-"]) { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
    button:not([class*="btn-"]):hover { background: var(--primary-hover); }
    button.secondary { background: #fff; color: #374151; border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
    button.secondary:hover { background: #f9fafb; }
    button.ghost, .close-btn, .expand-btn { background: #f3f4f6; color: #374151; box-shadow: none; }
    button.ghost:hover, .close-btn:hover { background: #e5e7eb; }
    button:disabled { cursor: not-allowed; opacity: .5; }
    button:active:not(:disabled) { transform: scale(.98); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    /* ---- Header Buttons ---- */
    .header-toggle {
      background: #fff; color: #374151; border: 1px solid var(--line); box-shadow: var(--shadow-sm);
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
    }
    .header-toggle:hover { background: #f9fafb; border-color: #d1d5db; }
    .auth-user { color: var(--muted); font-size: 13px; font-weight: 600; }

    /* ---- Config Topbar ---- */
    .topbar {
      display: none; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap; padding: 12px 16px;
      background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }
    .topbar.show { display: flex; }
    .topbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .topbar-toggle {
      background: #f3f4f6; color: #374151; box-shadow: none;
      padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
    }
    .topbar-toggle:hover { background: #e5e7eb; }
    .topbar-detail { display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
    .topbar-detail.show { display: flex; }
    .server-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: #f9fafb; border: 1px solid var(--line); border-radius: 999px;
      color: var(--muted); font-size: 12px; font-weight: 500;
    }
    .server-badge strong { color: var(--text); font-weight: 700; }
    .cache-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cache-info {
      color: var(--muted); font-size: 12px; padding: 6px 12px;
      background: #f9fafb; border-radius: 999px; border: 1px solid var(--line);
    }

    /* ---- Server Config ---- */
    .server-item {
      margin-top: 8px; padding: 12px; border: 1px solid var(--line);
      border-radius: var(--radius-sm); background: #fff;
      transition: box-shadow var(--transition);
    }
    .server-item:hover { box-shadow: var(--shadow); }
    .server-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .server-head strong { font-size: 14px; }
    .server-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .server-controls { display: flex; gap: 6px; margin-top: 8px; }
    .server-controls button { flex: 1; font-size: 13px; padding: 6px; }

    /* ---- Filters ---- */
    .filter-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 8px 12px; background: #fafbfc; border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .filter-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .filter-sep { width: 1px; height: 24px; background: var(--line); flex-shrink: 0; }
    .filter-input {
      padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      font-size: 13px; min-width: 130px; background: #fff;
    }
    .filter-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .filter-label { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .02em; }

    /* Dropdown */
    .multi-dropdown { position: relative; }
    .multi-dropdown > summary {
      list-style: none; cursor: pointer; padding: 8px 12px;
      border-radius: var(--radius-sm); border: 1px solid var(--line); background: #fff;
      color: var(--text); min-height: 38px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      user-select: none; font-size: 14px;
    }
    .multi-dropdown > summary::-webkit-details-marker { display: none; }
    .multi-dropdown > summary::after { content: "\25BE"; color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .multi-dropdown[open] > summary {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .dropdown-panel {
      position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 6px);
      background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 10px; max-height: 260px; overflow: auto;
    }
    .dropdown-list { display: grid; gap: 6px; }
    .dropdown-list label {
      display: flex; align-items: center; gap: 6px; margin: 0;
      font-size: 13px; font-weight: 500; color: #374151;
      padding: 4px 6px; border-radius: 6px; cursor: pointer;
    }
    .dropdown-list label:hover { background: #f3f4f6; }
    .dropdown-list input { width: auto; }

    /* Tag selectors / pills */
    .tag-selector { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag-option, .mini-option {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: #fff;
      color: #374151; font-size: 12px; font-weight: 600;
      cursor: pointer; user-select: none; transition: all var(--transition);
    }
    .tag-option input, .mini-option input { display: none; }
    .tag-option.active, .mini-option.active {
      border-color: var(--primary-border); background: var(--primary-light); color: var(--primary);
    }
    .mini-selector { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }

    /* Range presets */
    .range-preset-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .range-preset-btn {
      border: 1px solid var(--line); background: #fff; color: #374151; box-shadow: none;
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .range-preset-btn:hover { background: #f3f4f6; }
    .range-preset-btn.active {
      border-color: var(--primary-border); background: var(--primary-light); color: var(--primary);
    }
    .range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .filter-helper { color: var(--muted); font-size: 12px; }

    /* ---- Status Bar ---- */
    .status {
      min-height: 20px; white-space: pre-wrap; color: #374151;
      margin-top: 12px; padding: 10px 14px;
      background: #f9fafb; border: 1px solid var(--line);
      border-radius: var(--radius-sm); font-size: 13px; line-height: 1.5;
    }

    /* ---- Summary Metrics ---- */
    .summary {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: stretch;
      margin: 16px 0; padding: 0; border: none; background: none;
    }
    .metric {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 12px 20px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: #fff; min-width: 100px; box-shadow: var(--shadow-sm);
    }
    .metric div { color: var(--muted); font-size: 11px; font-weight: 600; order: 2; }
    .metric b { font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; order: 1; }
    .metric-sep { display: none; }

    /* ---- Board (Kanban) ---- */
    .view-switch {
      display: flex; gap: 6px; margin: 12px 0 8px; align-items: center; flex-wrap: wrap;
    }
    .view-tab {
      border: 1px solid var(--line); background: #fff; color: #374151; box-shadow: none;
      padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600;
    }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px; }

    .board-column {
      border: 1px solid var(--line); border-radius: var(--radius-lg);
      background: #fafbfc; min-height: 300px; overflow: hidden;
    }
    .board-head {
      display: grid; gap: 8px; padding: 14px 16px;
      border-bottom: 1px solid var(--line); background: #fff;
    }
    .board-head-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; font-weight: 700; font-size: 14px; color: #1f2937;
    }
    .board-count {
      display: inline-flex; min-width: 24px; height: 24px;
      align-items: center; justify-content: center; border-radius: 999px;
      background: #f3f4f6; font-size: 12px; font-weight: 700; color: #374151;
    }
    .board-head-summary { display: flex; gap: 16px; margin-top: 8px; }
    .board-head-stat {
      display: flex; flex-direction: column; align-items: center;
      background: #f0f4ff; border-radius: 8px; padding: 6px 12px; min-width: 80px;
    }
    .board-head-stat-value { font-size: 20px; font-weight: 800; color: var(--primary); line-height: 1.2; }
    .board-head-stat-label { font-size: 11px; color: #6b7280; }
    .board-head-filters { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .board-col-filter-btn {
      border: 1px solid var(--line); background: #fff; color: #374151; box-shadow: none;
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .board-col-filter-btn:hover { background: #f3f4f6; }
    .board-col-filter-btn.active {
      border-color: var(--primary-border); background: var(--primary-light); color: var(--primary);
    }
    .board-head-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .board-head-btn {
      border: 1px solid var(--line); background: #fff; color: #374151;
      box-shadow: none; padding: 5px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
    }
    .board-head-btn:hover { background: #f3f4f6; }
    .board-head-btn:disabled { opacity: .5; }
    .board-list { display: grid; gap: 8px; padding: 12px; max-height: 600px; overflow: auto; }
    .board-card {
      border: 1px solid var(--line); border-radius: var(--radius);
      background: #fff; padding: 14px; box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .board-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .board-card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .board-card-meta { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .board-card-timeline { margin-top: 10px; display: grid; gap: 4px; }
    .board-timeline-item {
      display: grid; grid-template-columns: auto 1fr; gap: 8px;
      align-items: baseline; font-size: 12px; color: #374151;
      padding: 3px 0;
    }
    .board-timeline-label {
      color: var(--muted); font-weight: 600; font-size: 11px;
      background: #f3f4f6; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .board-card-stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 6px; margin-top: 10px;
    }
    .board-stat {
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: #f9fafb; padding: 8px 10px;
    }
    .board-stat-label { color: var(--muted); font-size: 11px; font-weight: 600; }
    .board-stat-value { margin-top: 2px; color: var(--text); font-size: 18px; font-weight: 800; line-height: 1; }
    .board-card-stages { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
    .board-stage-tag {
      display: inline-flex; align-items: center; padding: 3px 8px;
      border-radius: 999px; background: #f3f4f6; border: 1px solid #e5e7eb;
      color: #374151; font-size: 11px; font-weight: 600;
    }
    .board-empty { color: var(--muted); font-size: 13px; padding: 20px 16px; text-align: center; }

    /* ---- Table ---- */
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px 12px; font-size: 13px; text-align: left; vertical-align: top; }
    th { background: #f9fafb; position: sticky; top: 0; z-index: 1; font-weight: 700; color: #374151; }
    tbody tr:hover { background: #f9fafb; }
    .expand-btn { padding: 4px 10px; font-size: 12px; border-radius: 999px; }
    .detail-row { background: #fafbfc; }
    .detail-card { padding: 12px 0 4px; }
    .detail-table th { position: static; background: #f3f4f6; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }

    .checkbox-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .checkbox-row label, .check-list label { display: inline-flex; align-items: center; gap: 6px; margin: 0; }
    .checkbox-row input, .check-list input { width: auto; }
    .inline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .check-list {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px; max-height: 200px; overflow: auto; margin-top: 10px;
    }

    /* ---- Overlays & Modals ---- */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: none; align-items: center; justify-content: center;
      padding: 24px; z-index: 1000;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(860px, 100%); max-height: 90vh; overflow: auto;
      background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--line);
      box-shadow: var(--shadow-xl); padding: 24px;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px;
    }
    .modal-head h2 { margin: 0; font-size: 18px; font-weight: 700; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .server-list-panel {
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 16px; background: #fafbfc;
    }
    .server-empty { color: var(--muted); font-size: 13px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 8px; line-height: 1.5; }

    /* Auth */
    .auth-overlay { z-index: 1200; }
    .auth-modal { width: min(420px, 100%); }
    .auth-status { min-height: 20px; margin-top: 10px; color: #6b7280; font-size: 12px; line-height: 1.5; }
    .auth-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .plain-check { display: inline-flex; align-items: center; gap: 6px; color: #374151; font-size: 13px; font-weight: 600; }
    .plain-check input { width: auto; margin: 0; }
    .user-list-panel {
      margin-top: 16px; border: 1px solid var(--line); border-radius: var(--radius);
      background: #fafbfc; padding: 12px;
    }
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line-soft);
    }
    .user-row:last-child { border-bottom: none; }
    .user-meta { color: #374151; font-size: 13px; font-weight: 600; }
    .user-role { color: var(--muted); font-size: 12px; }
    .danger-note { color: var(--warning); font-size: 12px; line-height: 1.5; margin-top: 8px; }
    .query-actions { align-items: center; }
    .query-actions #query-btn { min-width: 120px; }
    .query-actions #export-btn { min-width: 110px; }
    .section-note { margin-top: 8px; color: var(--muted); font-size: 12px; }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
      .page { padding: 16px; }
      .page-title h1 { font-size: 20px; }
      .modal-grid { grid-template-columns: 1fr; }
      .filter-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); }
      .filter-item.status, .filter-item.stage, .filter-item.time,
      .filter-item.project, .filter-item.server,
      .filter-item.database, .filter-item.exam { grid-column: span 4; }
      .inline-grid { grid-template-columns: 1fr; }
      .range-grid { grid-template-columns: 1fr; }
      .summary { gap: 4px; }
      .board { grid-template-columns: 1fr; }
      .metric { min-width: 80px; padding: 10px 14px; }
    }
    @media (max-width: 640px) {
      .card { padding: 16px; }
      .field-card { padding: 12px; }
      .filter-grid { grid-template-columns: 1fr; }
      .filter-item.status, .filter-item.stage, .filter-item.time,
      .filter-item.project, .filter-item.server,
      .filter-item.database, .filter-item.exam { grid-column: span 1; }
      .filter-actions { align-items: stretch; }
      .filter-actions .query-actions { width: 100%; }
      .filter-actions .query-actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-title">
        <div class="page-title-row">
          <h1>项目阶段汇总服务</h1>
          <span class="auth-user" id="auth-user"></span>
          <button id="toggle-config-panel" type="button" class="header-toggle">配置</button>
          <button id="open-user-modal" type="button" class="header-toggle" style="display:none;">新建用户</button>
          <button id="open-password-modal" type="button" class="header-toggle" style="display:none;">修改密码</button>
          <button id="logout-btn" type="button" class="header-toggle" style="display:none;">退出登录</button>
        </div>
        <div class="subtitle">跨 SQL Server / MySQL 汇总项目阶段，按考试代码聚合展示，默认读取本地缓存。</div>
      </div>
    </div>

    <div class="topbar" id="config-panel">
      <div class="topbar-left">
        <button id="open-server-modal" class="secondary">管理服务器</button>

            <input id="server-agent-port" type="number" value="0" placeholder="例如：5100">

              <button id="save-server">新增/更新</button>

              <button id="test-server" class="secondary">测试连接</button>
            </div>

  <script>
    let selectedIndex = null;
    let lastPayload = null;
    let lastSummary = null;
    let serversCache = [];
    let authMode = "login";
    let authReady = false;
    let currentIsAdmin = false;
    let forcePasswordChange = false;
    let summaryStoreConfig = null;

    function buildAppUrl(path) {
      const normalizedPath = String(path || "").replace(/^\/+/, "");
      const basePath = window.location.pathname.endsWith("/")
        ? window.location.pathname
        : window.location.pathname.replace(/\/[^/]*$/, "/");
      return new URL(normalizedPath, `${window.location.origin}${basePath}`).toString();
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function collectCheckedValues(selector) {
      return Array.from(document.querySelectorAll(selector))
        .filter(item => item.checked)
        .map(item => item.value);
    }

    function parseStageKeywords(value) {
      return String(value ?? "")
        .split("/")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function toLocalDateValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getSelectedDayOffsets() {
      return Array.from(document.querySelectorAll(".range-preset-btn.active"))
        .map(button => Number(button.dataset.dayOffset))
        .filter(offset => !Number.isNaN(offset))
        .sort((a, b) => a - b);
    }

    function syncRangeInputsFromSelectedDays() {
      const startInput = document.getElementById("range-start");
      const endInput = document.getElementById("range-end");
      const offsets = getSelectedDayOffsets();
      if (!offsets.length) {
        startInput.disabled = false;
        endInput.disabled = false;
        startInput.value = "";
        endInput.value = "";
        return;
      }

      const today = new Date();
      const firstOffset = offsets[0];
      const start = new Date(today.getFullYear(), today.getMonth(), today.getDate() + firstOffset, 0, 0, 0);
      const end = new Date(today.getFullYear(), today.getMonth(), today.getDate() + firstOffset, 23, 59, 0);
      startInput.disabled = true;
      endInput.disabled = true;
      startInput.value = toLocalDateValue(start);
      endInput.value = toLocalDateValue(end);
    }

    function buildAdmissionCountQueryPayload() {
      const payload = {
        ...lastPayload,
        statusFilters: ["即将开始"],
        stageNames: ["准考证"],
        dayOffsets: [0, 1, 2, 3, 4, 5, 6, 7]
      };
      return payload;
    }

    function updateDropdownSummary(summaryId, selector, emptyText, allText, totalCount = null) {
      const summary = document.getElementById(summaryId);
      if (!summary) return;
      const values = collectCheckedValues(selector);
      const effectiveTotal = totalCount ?? document.querySelectorAll(selector).length;
      if (!values.length) {
        summary.textContent = emptyText;
        return;
      }
      if (effectiveTotal > 0 && values.length === effectiveTotal) {
        summary.textContent = allText;
        return;
      }
      summary.textContent = values.join("、");
    }

    async function loadCacheInfo() {
      const response = await apiFetch(buildAppUrl("api/cache-info"));
      if (!response.ok) {
        throw new Error("读取缓存状态失败");
      }
      return response.json();
    }

    async function loadServers() {
      const response = await apiFetch(buildAppUrl("api/servers"));
      if (!response.ok) {
        throw new Error("读取服务器配置失败");
      }
      const data = await response.json();
      serversCache = Array.isArray(data) ? data : [];
      return serversCache;
    }

    async function saveServers(servers) {
      const response = await apiFetch(buildAppUrl("api/servers"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(servers)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || "保存服务器配置失败");
      }
      serversCache = servers;
    }

    function fillForm(server) {
      document.getElementById("server-name").value = server?.name || "";
      document.getElementById("server-type").value = server?.databaseType || "SQL Server";
      document.getElementById("server-host").value = server?.host || "";
      document.getElementById("server-port").value = server?.port || "1433";
      document.getElementById("server-user").value = server?.username || "";
      document.getElementById("server-password").value = server?.password || "";
      document.getElementById("server-agent-port").value = server?.agentPort || 0;
    }

    function renderServerFilterOptions() {
      const container = document.getElementById("server-filter-options");
      if (!container) return;

      const selected = new Set(collectCheckedValues(".server-filter"));
      const options = serversCache
        .map(item => item.name?.trim())
        .filter(Boolean)
        .filter((name, index, list) => list.findIndex(item => item.toLowerCase() === name.toLowerCase()) === index)
        .sort((a, b) => a.localeCompare(b, "zh-CN"));

      if (!options.length) {
        container.innerHTML = '<div class="server-empty">还没有可选服务器。</div>';
        updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", 0);
        return;
      }

      container.innerHTML = options.map(name => `
        <label><input type="checkbox" class="server-filter" value="${escapeHtml(name)}" ${selected.has(name) ? "checked" : ""}> ${escapeHtml(name)}</label>
      `).join("");
      updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", options.length);
    }

    function renderServers() {
      const container = document.getElementById("server-list");
      const servers = serversCache;
      document.getElementById("server-count").textContent = String(servers.length);
      document.getElementById("enabled-count").textContent = String(servers.filter(item => item.enabled).length);
      container.innerHTML = "";
      if (!servers.length) {
        container.innerHTML = '<div class="server-empty">还没有添加服务器。</div>';
        renderServerFilterOptions();
        return;
      }
      servers.forEach((server, index) => {
        const item = document.createElement("div");
        item.className = "server-item";
        item.innerHTML = `
          <div class="server-head">
            <strong>${server.name}</strong>
            <label><input type="checkbox" data-action="toggle" data-index="${index}" ${server.enabled ? "checked" : ""}> 启用</label>
          </div>
          <div class="server-meta">${server.databaseType || "SQL Server"} / ${server.host}:${server.port} / ${server.username}</div>
          <div class="server-controls">
            <button class="ghost" data-action="edit" data-index="${index}">编辑</button>
            <button class="ghost" data-action="delete" data-index="${index}">删除</button>
          </div>`;
        container.appendChild(item);
      });
      renderServerFilterOptions();
    }

    function enabledServers() {
      return serversCache.filter(item => item.enabled);
    }

    function setServerStatus(text) {
      document.getElementById("server-status").textContent = text;
    }

    function setQueryStatus(text) {
      const el = document.getElementById("query-status");
      el.style.whiteSpace = "pre-wrap";
      el.textContent = text;
    }

    function renderCacheInfo(info) {
      document.getElementById("cache-record-count").textContent = String(info?.recordCount || 0);
      if (!info?.hasData || !info?.refreshedAt) {
        document.getElementById("cache-info").textContent = "缓存尚未更新，请先点击“更新数据”。";
        return;
      }

      document.getElementById("cache-info").textContent =
        `上次更新：${formatDateTime(info.refreshedAt)}，启用服务器 ${info.enabledServers} 台，遍历数据库 ${info.visitedDatabases} 个，业务库 ${info.matchedDatabases} 个。`;
    }

    function showServerModal() {
      document.getElementById("server-overlay").classList.add("show");
    }

    function hideServerModal() {
      document.getElementById("server-overlay").classList.remove("show");
    }

    function buildPayload() {
      const typedStageNames = parseStageKeywords(document.getElementById("stage-keyword").value);
      const stageNames = [...typedStageNames]
        .filter((item, index, list) => list.findIndex(value => value.toLowerCase() === item.toLowerCase()) === index);
      const dayOffsets = getSelectedDayOffsets();

      return {
        servers: enabledServers(),
        statusFilters: collectCheckedValues(".status-filter"),
        timeMatchMode: document.querySelector(".time-match-mode:checked")?.value || "overlap",
        stageKeyword: "",
        stageNames,
        serverNames: collectCheckedValues(".server-filter"),
        projectKeyword: document.getElementById("project-keyword").value.trim(),
        serverKeyword: "",
        databaseKeyword: document.getElementById("database-keyword").value.trim(),
        examCodeKeyword: document.getElementById("exam-code-keyword").value.trim(),
        dayOffsets,
        rangeStart: dayOffsets.length > 0 ? null : (document.getElementById("range-start").value || null),
        rangeEnd: dayOffsets.length > 0 ? null : (document.getElementById("range-end").value || null)
      };
    }

    function setAuthStatus(text) {
      document.getElementById("auth-status").textContent = text;
    }

    function setUserStatus(text) {
      document.getElementById("user-status").textContent = text;
    }

    function setPasswordStatus(text) {
      document.getElementById("password-status").textContent = text;
    }

    function setSummaryStoreStatus(text) {
      document.getElementById("summary-store-status").textContent = text;
    }

    function updateAuthView(hasAccount, username = "", isAdmin = false) {
      authMode = hasAccount ? "login" : "setup";
      currentIsAdmin = isAdmin;
      document.getElementById("auth-title").textContent = hasAccount ? "登录验证" : "初始化账号";
      document.getElementById("auth-submit-btn").textContent = hasAccount ? "登录" : "设置账号并登录";
      document.getElementById("auth-hint").textContent = hasAccount
        ? "请输入登录账号后继续。"
        : "系统首次使用，请先设置一个本地管理员账号。";
      document.getElementById("auth-confirm-wrap").style.display = hasAccount ? "none" : "block";
      document.getElementById("auth-user").textContent = username ? `当前用户：${username}` : "";
      document.getElementById("logout-btn").style.display = username ? "inline-flex" : "none";
      document.getElementById("open-user-modal").style.display = username && isAdmin ? "inline-flex" : "none";
      document.getElementById("open-password-modal").style.display = username ? "inline-flex" : "none";
      document.getElementById("open-summary-store-modal").style.display = username && isAdmin ? "inline-flex" : "none";
      document.getElementById("open-schedule-modal").style.display = username && isAdmin ? "inline-flex" : "none";
    }

    function showAuthOverlay() {
      document.getElementById("auth-overlay").classList.add("show");
    }

    function hideAuthOverlay() {
      document.getElementById("auth-overlay").classList.remove("show");
      setAuthStatus("");
    }

    function showUserOverlay() {
      document.getElementById("user-overlay").classList.add("show");
      loadUsersForAdmin().catch(error => setUserStatus(error.message));
    }

    function hideUserOverlay() {
      document.getElementById("user-overlay").classList.remove("show");
      setUserStatus("");
      document.getElementById("new-user-username").value = "";
      document.getElementById("user-list").innerHTML = "";
    }

    function showPasswordOverlay(force = false) {
      forcePasswordChange = force;
      document.getElementById("password-overlay").classList.add("show");
      document.getElementById("password-note").style.display = force ? "block" : "none";
      document.getElementById("close-password-modal").style.display = force ? "none" : "inline-flex";

    function renderSummary(summary) {
      lastSummary = summary;
      const groups = Array.isArray(summary?.groups) ? summary.groups : [];
      const ongoingGroups = groups.filter(item => getGroupPrimaryStatus(item) === "正在进行");
      const upcomingGroups = groups.filter(item => getGroupPrimaryStatus(item) === "即将开始");
      const endedGroups = groups.filter(item => getGroupPrimaryStatus(item) === "已结束");
      const totalRegistrationCount = groups.reduce((sum, item) => sum + (item.registrationCount || 0), 0);
      const totalAdmissionTicketCount = groups.reduce((sum, item) => sum + (item.admissionTicketCount || 0), 0);

      document.getElementById("summary-panel").innerHTML = `
        <div class="metric"><div>正在进行</div><b>${ongoingGroups.length}</b></div>
        <span class="metric-sep">|</span>
        <div class="metric"><div>即将开始</div><b>${upcomingGroups.length}</b></div>
        <span class="metric-sep">|</span>
        <div class="metric"><div>已结束</div><b>${endedGroups.length}</b></div>
        <span class="metric-sep">|</span>
        <div class="metric"><div>报名人数</div><b>${totalRegistrationCount}</b></div>
        <span class="metric-sep">|</span>
        <div class="metric"><div>准考证人数</div><b>${totalAdmissionTicketCount}</b></div>`;
    }

    function formatDateTime(value) {
      if (!value) return "";
      return value.replace("T", " ").slice(0, 19);
    }

    function renderStageTimeRange(stage, emptyText = "-") {
      if (!stage) return emptyText;
      return `${formatDateTime(stage.startTime)} 至 ${formatDateTime(stage.endTime)}`;
    }

    function buildTimelineStages(stages) {
      const items = Array.isArray(stages) ? stages : [];
      const seen = new Set();
      return items.filter(stage => {
        const name = String(stage?.stageName || "").trim();
        if (!name) return false;
        const key = name.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function getGroupPrimaryStatus(group) {
      const statuses = Array.isArray(group?.statuses) ? group.statuses : [];
      if (statuses.includes("正在进行")) return "正在进行";
      if (statuses.includes("即将开始")) return "即将开始";
      if (statuses.includes("已经结束") || statuses.includes("已结束")) return "已结束";
      return statuses[0] || "其他";
    }

    function getBoardTargets(statusFilter) {
      const groups = Array.isArray(lastSummary?.groups) ? lastSummary.groups : [];
      return groups
        .filter(group => getGroupPrimaryStatus(group) === statusFilter)
        .map(group => ({
          serverName: group.serverName,
          databaseName: group.databaseName,
          examCode: group.examCode
        }));
    }

    let allBoardGroups = [];
    let currentBoardFilter = "all";

    function renderBoard(groups) {
      allBoardGroups = groups;
      const board = document.getElementById("board-panel");
      const columns = [
        { key: "正在进行", title: "正在进行" },
        { key: "即将开始", title: "即将开始" },
        { key: "已结束", title: "已结束" }
      ];

      if (!groups.length) {
        board.innerHTML = columns.map(column => `
          <section class="board-column">
            <div class="board-head">
              <div class="board-head-top"><span>${column.title}</span><span class="board-count">0</span></div>
            </div>
            <div class="board-empty">没有项目</div>
          </section>
        `).join("");
        return;
      }

      board.innerHTML = columns.map(column => {
        const items = groups.filter(group => getGroupPrimaryStatus(group) === column.key);
        const totalReg = items.reduce((sum, item) => sum + (item.registrationCount || 0), 0);
        const totalAdm = items.reduce((sum, item) => sum + (item.admissionTicketCount || 0), 0);
        return `
          <section class="board-column" data-column-key="${column.key}">
            <div class="board-head">
              <div class="board-head-top"><span>${column.title}</span><span class="board-count">${items.length}</span></div>
              <div class="board-head-summary">
                <div class="board-head-stat">
                  <div class="board-head-stat-value">${totalReg.toLocaleString()}</div>
                  <div class="board-head-stat-label">报名人数</div>
                </div>
                <div class="board-head-stat">
                  <div class="board-head-stat-value">${totalAdm.toLocaleString()}</div>
                  <div class="board-head-stat-label">准考证人数</div>
                </div>
              </div>
              <div class="board-head-filters">
                <button class="board-col-filter-btn active" data-col-filter="registration" data-col-status="${column.key}">有报名</button>
                <button class="board-col-filter-btn active" data-col-filter="admission" data-col-status="${column.key}">有准考证</button>
                <button class="board-col-filter-btn active" data-col-filter="other" data-col-status="${column.key}">其他</button>
              </div>
            </div>
            <div class="board-list">
              ${items.length ? items.map(item => `
                <article class="board-card">
                  <div class="board-card-title">${escapeHtml(item.projectName || "-")}</div>
                  <div class="board-card-meta">
                    <div>${escapeHtml(item.serverName)} / ${escapeHtml(item.databaseName)}</div>
                    <div>考试代码：${escapeHtml(item.examCode || "-")}</div>
                  </div>
                  <div class="board-card-timeline">
                    ${buildTimelineStages(item.stages).map(stage => `
                      <div class="board-timeline-item">
                        <div class="board-timeline-label">${escapeHtml(stage.stageName)}</div>
                        <div>${escapeHtml(renderStageTimeRange(stage))}</div>
                      </div>
                    `).join("") || `
                      <div class="board-timeline-item">
                        <div class="board-timeline-label">阶段</div>
                        <div>-</div>
                      </div>
                    `}
                  </div>
                  <div class="board-card-stats">
                    <div class="board-stat">
                      <div class="board-stat-label">报名人数</div>
                      <div class="board-stat-value">${item.registrationCount ?? 0}</div>
                    </div>
                    <div class="board-stat">
                      <div class="board-stat-label">准考证人数</div>
                      <div class="board-stat-value">${item.admissionTicketCount ?? 0}</div>
                    </div>
                  </div>
                  <div class="board-card-stages">
                    ${(item.stages || []).map(stage => `<span class="board-stage-tag">${escapeHtml(stage.stageName)}</span>`).join("")}
                  </div>
                </article>
              `).join("") : '<div class="board-empty">没有项目</div>'}
            </div>
          </section>
        `;
      }).join("");
    }

          for (const ar of result.agentResults) {
            if (ar.success) {
              msg += `\n  ${ar.serverName}：成功，${ar.databases} 个库，${ar.records} 条记录`;

              msg += `\n  ${ar.serverName}：失败 - ${ar.error || "未知错误"}`;

        setQueryStatus(msg);
        if (lastPayload) {
          const queryResult = await postJson(buildAppUrl("api/query"), lastPayload);
          renderSummary(queryResult);
          renderBoard(queryResult.groups || []);
          document.getElementById("export-btn").disabled = (queryResult.records || []).length === 0;
        }
      } catch (error) {
        setQueryStatus(error.message);
      } finally {
        document.getElementById("refresh-btn").disabled = false;
      }
    });

    document.getElementById("query-btn").addEventListener("click", async () => {
      try {
        if (!authReady) throw new Error("请先登录。");
        lastPayload = buildPayload();
        setQueryStatus("正在查询缓存，请稍候...");
        const result = await postJson(buildAppUrl("api/query"), lastPayload);
        renderSummary(result);
        renderBoard(result.groups || []);
        document.getElementById("export-btn").disabled = (result.records || []).length === 0;
        setQueryStatus(`缓存查询完成：启用服务器 ${result.enabledServers} 台，遍历数据库 ${result.visitedDatabases} 个，匹配业务库 ${result.matchedDatabases} 个，项目 ${((result.groups || []).length)} 个，阶段 ${(result.records || []).length} 条。`);
      } catch (error) {
        document.getElementById("export-btn").disabled = true;
        setQueryStatus(error.message);
      }
    });

    async function loadBoardCounts(includeRegistrationCount, includeAdmissionTicketCount, statusFilter) {
      if (!lastPayload) {
        setQueryStatus("请先查询，再按当前筛选条件统计人数。");
        return;
      }

      const targets = getBoardTargets(statusFilter);
      if (!targets.length) {
        setQueryStatus(`当前"${statusFilter}"列没有可统计的项目。`);
        return;
      }

      try {
        if (!authReady) throw new Error("请先登录。");
        setQueryStatus(
          includeRegistrationCount && includeAdmissionTicketCount
            ? "正在按当前筛选条件统计报名人数和准考证人数，请稍候..."
            : includeRegistrationCount
              ? `正在统计"${statusFilter}"列的报名人数，请稍候...`
              : "正在统计今天到未来 7 天内、且状态为即将开始的准考证人数，请稍候..."
        );
        const result = await postJson(buildAppUrl("api/board-counts"), {
          query: includeAdmissionTicketCount && !includeRegistrationCount
            ? buildAdmissionCountQueryPayload()
            : {
                ...lastPayload,
                statusFilters: [statusFilter]
              },
          includeRegistrationCount,
          includeAdmissionTicketCount,
          targets
        });
        renderSummary(result);
        renderBoard(result.groups || []);
        setQueryStatus(`人数统计完成：项目 ${((result.groups || []).length)} 个，阶段 ${(result.records || []).length} 条。`);
      } catch (error) {
        setQueryStatus(error.message);
      }
    }

    document.getElementById("board-panel").addEventListener("click", (event) => {
      const btn = event.target.closest(".board-col-filter-btn");
      if (!btn) return;
      const column = btn.closest(".board-column");
      if (!column) return;
      const status = btn.dataset.colStatus;

      // toggle 当前按钮
      btn.classList.toggle("active");

      // 收集该列所有选中的筛选条件
      const activeFilters = new Set();
      column.querySelectorAll(".board-col-filter-btn.active").forEach(b => activeFilters.add(b.dataset.colFilter));
      const allSelected = activeFilters.size === 3;

      // 筛选该列的卡片
      const allItems = allBoardGroups.filter(g => getGroupPrimaryStatus(g) === status);
      let filtered;
      if (allSelected || activeFilters.size === 0) {
        // 全选或全不选 → 显示全部
        filtered = allItems;
      } else {
        filtered = allItems.filter(g => {
          const hasReg = (g.registrationCount || 0) > 0;
          const hasAdm = (g.admissionTicketCount || 0) > 0;
          const isOther = !hasReg && !hasAdm;
          if (activeFilters.has("registration") && hasReg) return true;
          if (activeFilters.has("admission") && hasAdm) return true;
          if (activeFilters.has("other") && isOther) return true;
          return false;
        });
      }

      // 更新计数
      column.querySelector(".board-count").textContent = filtered.length;

      // 重新渲染卡片列表
      const listEl = column.querySelector(".board-list");
      listEl.innerHTML = filtered.length ? filtered.map(item => `
        <article class="board-card">
          <div class="board-card-title">${escapeHtml(item.projectName || "-")}</div>
          <div class="board-card-meta">
            <div>${escapeHtml(item.serverName)} / ${escapeHtml(item.databaseName)}</div>
            <div>考试代码：${escapeHtml(item.examCode || "-")}</div>
          </div>
          <div class="board-card-stats">
            <div class="board-stat">
              <div class="board-stat-label">报名人数</div>
              <div class="board-stat-value">${item.registrationCount ?? 0}</div>
            </div>
            <div class="board-stat">
              <div class="board-stat-label">准考证人数</div>
              <div class="board-stat-value">${item.admissionTicketCount ?? 0}</div>
            </div>
          </div>
          <div class="board-card-stages">
            ${(item.stages || []).map(stage => `<span class="board-stage-tag">${escapeHtml(stage.stageName)}</span>`).join("")}
          </div>
        </article>
      `).join("") : '<div class="board-empty">没有项目</div>';
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (target.classList.contains("status-filter")) {
        target.closest(".tag-option")?.classList.toggle("active", target.checked);
      }
      if (target.classList.contains("server-filter")) {
        updateDropdownSummary("server-summary", ".server-filter", "全部服务器", "全部服务器", document.querySelectorAll(".server-filter").length);
      }
      if (target.classList.contains("time-match-mode")) {
        document.querySelectorAll(".mini-option").forEach(option => {
          const input = option.querySelector(".time-match-mode");
          option.classList.toggle("active", Boolean(input?.checked));
        });
      }
      if (target.id === "range-start" || target.id === "range-end") {
        document.querySelectorAll(".range-preset-btn").forEach(button => button.classList.remove("active"));
        document.getElementById("range-start").disabled = false;
        document.getElementById("range-end").disabled = false;
      }
    });

    document.querySelectorAll(".range-preset-btn").forEach(button => {
      button.addEventListener("click", () => {
        button.classList.toggle("active");
        syncRangeInputsFromSelectedDays();
      });
    });

    document.getElementById("export-btn").addEventListener("click", async () => {
      if (!lastPayload) return;
      try {
        if (!authReady) throw new Error("请先登录。");
        const response = await apiFetch(buildAppUrl("api/export"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(lastPayload)
        });
        if (response.status === 401) {
          throw new Error("请先登录。");
        }
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "导出失败");
        }
        const blob = await response.blob();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "项目阶段汇总.xlsx";
        link.click();
      } catch (error) {
        setQueryStatus(error.message);
      }
    });

    document.getElementById("auth-password").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("auth-submit-btn").click();
      }
    });
    document.getElementById("auth-confirm-password").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("auth-submit-btn").click();
      }
    });
    document.getElementById("new-user-username").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("create-user-btn").click();
      }
    });
    document.getElementById("password-confirm").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("change-password-btn").click();
      }
    });

    renderSummary({ groups: [] });
    renderBoard([]);

    (async () => {
      try {
        const authStatus = await loadAuthStatus();
        updateAuthView(
          Boolean(authStatus?.hasAccount),
          authStatus?.authenticated ? (authStatus?.username || "") : "",
          Boolean(authStatus?.isAdmin)
        );
        if (authStatus?.authenticated) {
          hideAuthOverlay();
          if (authStatus?.forcePasswordChange) {
            showPasswordOverlay(true);
            return;
          }
          await bootstrapAfterLogin();
        } else {
          showAuthOverlay();
        }
      } catch (error) {
        setAuthStatus(error.message);
        showAuthOverlay();
      }
    })();
  </script>
</body>
</html>
